services:
  postgres:
    image: postgres:16-alpine
    container_name: opencrow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opencrow}
      POSTGRES_USER: ${POSTGRES_USER:-opencrow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opencrow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opencrow} -d ${POSTGRES_DB:-opencrow}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server-state-init:
    image: alpine:3.20
    container_name: opencrow-state-init
    command:
      [
        "sh",
        "-c",
        "mkdir -p /data && chown -R 65532:65532 /data && chmod -R u+rwX,g+rwX /data"
      ]
    volumes:
      - server_state:/data
    restart: "no"

  server:
    image: ghcr.io/d3vv3/opencrow-server:${OPENCROW_VERSION:-latest}
    container_name: opencrow-server
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://opencrow:opencrow@postgres:5432/opencrow?sslmode=disable}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8080}
      APP_ENV: ${APP_ENV:-production}
      JWT_ISSUER: ${JWT_ISSUER:-openCrow}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-720h}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_BCRYPT: ${ADMIN_PASSWORD_BCRYPT}
      SERVER_SHELL_TIMEOUT: ${SERVER_SHELL_TIMEOUT:-8s}
      STATE_DIR: /data
      CONFIG_FILE_PATH: /data/config.json
      TZ: ${TZ:-Europe/Berlin}
      WHISPER_ENDPOINT: ${WHISPER_ENDPOINT:-http://whisper:8081}
      WHISPER_MODEL: ${WHISPER_MODEL:-ggml-small}
      KOKORO_ENDPOINT: ${KOKORO_ENDPOINT:-http://kokoro:8880}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      MAX_SESSIONS_PER_USER: ${MAX_SESSIONS_PER_USER:-1}
    depends_on:
      postgres:
        condition: service_healthy
      server-state-init:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    volumes:
      - server_state:/data
      - sandbox:/sandbox

  whisper:
    image: ghcr.io/mutablelogic/go-whisper:latest
    container_name: opencrow-whisper
    restart: unless-stopped
    command: ["run", "--http.addr=0.0.0.0:8081"]
    environment:
      WHISPER_MODEL_PATH: /models
    ports:
      - "${WHISPER_PORT:-8081}:8081"
    volumes:
      - whisper_models:/models

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: opencrow-kokoro
    restart: unless-stopped
    ports:
      - "${KOKORO_PORT:-8880}:8880"
    volumes:
      - kokoro_data:/app/api/src/models/v1_0

  web:
    image: ghcr.io/d3vv3/opencrow-web:${OPENCROW_VERSION:-latest}
    container_name: opencrow-web
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
      API_INTERNAL_BASE_URL: http://server:8080
      OPENCROW_VERSION: ${OPENCROW_VERSION:-latest}
    depends_on:
      server:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  server_state:
  sandbox:
  whisper_models:
  kokoro_data:
