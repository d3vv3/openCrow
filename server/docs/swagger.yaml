        $ref: '#/definitions/configstore.VoiceConfig'
    type: object
  configstore.VoiceConfig:
    properties:
      defaultVoice:
        description: DefaultVoice is the Kokoro voice used when no per-language override
          matches.
        type: string
      languageVoices:
        additionalProperties:
          type: string
        description: |-
          LanguageVoices maps BCP-47 language codes (e.g. "en", "ja", "fr") to voice IDs.
          When the detected language of the TTS text matches a key, the mapped voice is used.
        type: object
    type: object
