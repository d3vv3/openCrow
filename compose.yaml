services:
  postgres:
    image: postgres:16-alpine
    container_name: opencrow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opencrow}
      POSTGRES_USER: ${POSTGRES_USER:-opencrow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opencrow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opencrow} -d ${POSTGRES_DB:-opencrow}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: opencrow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: opencrow-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "${DATABASE_URL:-postgres://opencrow:opencrow@postgres:5432/opencrow?sslmode=disable}",
        "up"
      ]

  server-state-init:
    image: alpine:3.20
    container_name: opencrow-state-init
    command:
      [
        "sh",
        "-c",
        "mkdir -p /data && chown -R 65532:65532 /data && chmod -R u+rwX,g+rwX /data"
      ]
    volumes:
      - server_state:/data
    restart: "no"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runtime-prod
    container_name: opencrow-server
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://opencrow:opencrow@postgres:5432/opencrow?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8080}
      APP_ENV: ${APP_ENV:-production}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      JWT_ISSUER: ${JWT_ISSUER:-openCrow}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-720h}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_BCRYPT: ${ADMIN_PASSWORD_BCRYPT}
      SERVER_SHELL_TIMEOUT: ${SERVER_SHELL_TIMEOUT:-8s}
      STATE_DIR: /data
      CONFIG_FILE_PATH: /data/config.json
      TZ: ${TZ:-Europe/Berlin}
      WHISPER_ENDPOINT: ${WHISPER_ENDPOINT:-http://whisper:8081}
      WHISPER_MODEL: ${WHISPER_MODEL:-ggml-base}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      server-state-init:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - server_state:/data
      - sandbox:/sandbox

  whisper:
    image: ghcr.io/mutablelogic/go-whisper:latest
    container_name: opencrow-whisper
    restart: unless-stopped
    command: ["run", "--http.addr=0.0.0.0:8081"]
    environment:
      WHISPER_MODEL_PATH: /models
    ports:
      - "${WHISPER_PORT:-8081}:8081"
    volumes:
      - whisper_models:/models

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: runtime-prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: opencrow-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      API_INTERNAL_BASE_URL: http://server:8080
    depends_on:
      server:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  server_state:
  sandbox:
  whisper_models:
